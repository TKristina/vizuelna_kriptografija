name: Konvertuj MD u PDF

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Preuzmi kod
        uses: actions/checkout@v4

      - name: Instaliraj Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex

      - name: Konvertuj u PDF
        run: |
          pandoc "Seminarski_rad_Vizuelna_kriptografija.md" -o seminarski_rad.pdf \
            --pdf-engine=xelatex \
            -V geometry:margin=1in

      - name: Uploaduj PDF
        uses: actions/upload-artifact@v4
        with:
          name: seminarski-rad-pdf
          path: seminarski_rad.pdf